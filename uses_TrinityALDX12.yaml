# This file defines settings for all modules that link against TrinityAL built with DX12

Imports:
- ../core_project/core_project.yaml
- ../CcpCore/uses_CcpCore.yaml
- ../../../vendor/ATI/CrossFire Detect/CrossFire.yaml
- ../../../vendor/nvidia/aftermath/1.3/aftermath.yaml

ClCompile:
  PreprocessorDefinitions:
  - TRINITY_PLATFORM=TRINITY_DIRECTX12
  AdditionalIncludeDirectories:
  - $(ProgramFiles)/Windows Kits/10/Include/10.0.17763.0/um
  - $(ProgramFiles)/Windows Kits/10/Include/10.0.17763.0/shared
Link:
  AdditionalLibraryDirectories:
  - ../../autobuild/TrinityAL/$(Platform)/$(PlatformToolset)/
  - $(ProgramFiles)/Windows Kits/10/Lib/10.0.17763.0/um/$(PlatformTarget)
  AdditionalDependencies:
  - dxgi.lib
  - d3d12.lib

Configurations:
  Debug|Win32,x64:
    ClCompile:
      PreprocessorDefinitions:
      - TRINITY_AL_GUARD_LOCKS=1
    Link:
      AdditionalDependencies:
      - TrinityAL_dx12_d.lib
  
  Dev|Win32,x64:
    ClCompile:
      PreprocessorDefinitions:
      - TRINITY_AL_GUARD_LOCKS=1
      - AL_TACK_RESOURCE_USAGE=1
    Link:
      AdditionalDependencies:
      - TrinityAL_dx12_dev.lib
  
  Release|Win32,x64:
    Link:
      AdditionalDependencies:
      - TrinityAL_dx12.lib
