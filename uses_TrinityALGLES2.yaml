# This file defines settings for all modules that link against TrinityAL built with OpenGL

Imports:
- ../core_project/core_project.yaml
- ../CcpCore/uses_CcpCore.yaml
- ../../../vendor/glew/1.7.0/glew.yaml

ClCompile:
  PreprocessorDefinitions:
  - TRINITY_PLATFORM=TRINITY_OPENGLES2
Link:
  AdditionalLibraryDirectories:
  - ../../autobuild/TrinityAL/$(Platform)/$(PlatformToolset)/

Configurations:
  Debug|Win32,x64:
    Imports:
    - ../../../vendor/ATI/CrossFire Detect/CrossFire.yaml
    Link:
      AdditionalDependencies:
      - TrinityAL_gles2_d.lib
  
  Dev|Win32,x64:
    Imports:
    - ../../../vendor/ATI/CrossFire Detect/CrossFire.yaml
    ClCompile:
      PreprocessorDefinitions:
      - AL_TACK_RESOURCE_USAGE=1
    Link:
      AdditionalDependencies:
      - TrinityAL_gles2_dev.lib
  
  Release|Win32,x64:
    Imports:
    - ../../../vendor/ATI/CrossFire Detect/CrossFire.yaml
    Link:
      AdditionalDependencies:
      - TrinityAL_gles2.lib

  Debug|Linux32,Linux64,Mac32,Mac64:
    Imports:
    - ../../../vendor/glfw/3.0/glfw.yaml
    Link:
      AdditionalDependencies:
      - TrinityAL_gles2_d.lib

  Dev|Linux32,Linux64,Mac32,Mac64:
    Imports:
    - ../../../vendor/glfw/3.0/glfw.yaml
    ClCompile:
      PreprocessorDefinitions:
      - AL_TACK_RESOURCE_USAGE=1
    Link:
      AdditionalDependencies:
      - TrinityAL_gles2_dev.lib
  
  Release|Linux32,Linux64,Mac32,Mac64:
    Imports:
    - ../../../vendor/glfw/3.0/glfw.yaml
    Link:
      AdditionalDependencies:
      - TrinityAL_gles2.lib

  Debug|Tegra-Android:
    ClCompile:
      PreprocessorDefinitions:
      - TRACK_AL_RESOURCES=0
    Link:
      AdditionalDependencies:
      - TrinityAL_gles2_d
      - EGL
      - GLESv2
      - android
  
  Release|Tegra-Android:
    ClCompile:
      PreprocessorDefinitions:
      - TRACK_AL_RESOURCES=0
    Link:
      AdditionalDependencies:
      - TrinityAL_gles2
      - EGL
      - GLESv2
      - android

