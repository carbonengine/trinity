# This file defines settings for all modules that link against TrinityAL built with DX11

Imports:
- ../core_project/core_project.yaml
- ../CcpCore/uses_CcpCore.yaml
- ../../../../../../sdk/directx/february2010/Include/directx_february2010.yaml
- ../../../../../../sdk/nvidia/NVAPI/R265/NVAPI_R265.yaml
- ../../../../../../sdk/ATI/CrossFire Detect/CrossFire.yaml
- ../../../../../../sdk/nvidia/aftermath/1.3/aftermath.yaml
- ../../../../../../sdk/vulkan/1.1.97.0/vulkan.yaml

ClCompile:
  PreprocessorDefinitions:
  - TRINITY_PLATFORM=TRINITY_VULKAN
Link:
  AdditionalLibraryDirectories:
  - ../../autobuild/TrinityAL/$(Platform)/$(PlatformToolset)/

Configurations:
  Debug|Win32,x64:
    ClCompile:
      PreprocessorDefinitions:
      - TRINITY_AL_GUARD_LOCKS=1
    Link:
      AdditionalDependencies:
      - TrinityAL_vulkan_d.lib
      - dxgi.lib
  
  Dev|Win32,x64:
    ClCompile:
      PreprocessorDefinitions:
      - TRINITY_AL_GUARD_LOCKS=1
      - AL_TACK_RESOURCE_USAGE=1
    Link:
      AdditionalDependencies:
      - TrinityAL_vulkan_dev.lib
      - dxgi.lib
  
  Release|Win32,x64:
    Link:
      AdditionalDependencies:
      - TrinityAL_vulkan.lib
      - dxgi.lib
