# This file defines settings for all modules that link against TrinityAL built with DX9

Imports:
- ../core_project/core_project.yaml
- ../CcpCore/uses_CcpCore.yaml

ClCompile:
  PreprocessorDefinitions:
  - TRINITY_PLATFORM=TRINITY_STUB
Link:
  AdditionalLibraryDirectories:
  - ../../autobuild/TrinityAL/$(Platform)/$(PlatformToolset)/

Configurations:
  Debug|Win32,x64,Mac32,Mac64:
    Link:
      AdditionalDependencies:
      - TrinityAL_stub_d.lib
  
  Dev|Win32,x64:
    ClCompile:
      PreprocessorDefinitions:
      - AL_TACK_RESOURCE_USAGE=1
    Link:
      AdditionalDependencies:
      - TrinityAL_stub_dev.lib
  
  Release|Win32,x64,Mac32,Mac64:
    Link:
      AdditionalDependencies:
      - TrinityAL_stub.lib
