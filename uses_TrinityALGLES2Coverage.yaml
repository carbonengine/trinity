# This file defines settings for all modules that link against TrinityAL built with OpenGL

Imports:
- ../core_project/core_project.yaml
- ../CcpCore/uses_CcpCore.yaml
- ../../../../../../sdk/glew/1.7.0/glew_1.7.0.yaml

ClCompile:
  PreprocessorDefinitions:
  - TRINITY_PLATFORM=TRINITY_OPENGLES2
Link:
  AdditionalLibraryDirectories:
  - ../../autobuild/TrinityAL/$(Platform)/$(PlatformToolset)/

Configurations:
  Release|Mac64:
    Imports:
    - ../../../../../../sdk/glfw/3.0/glfw_3.0.yaml
    Link:
      AdditionalDependencies:
      - TrinityAL_gles2_cc.lib
