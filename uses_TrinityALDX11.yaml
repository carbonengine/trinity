# This file defines settings for all modules that link against TrinityAL built with DX11

Imports:
- ../core_project/core_project.yaml
- ../CcpCore/uses_CcpCore.yaml
- ../../../vendor/directx/february2010/directx.yaml
- ../../../vendor/ATI/CrossFire Detect/CrossFire.yaml
- ../../../vendor/nvidia/aftermath/1.3/aftermath.yaml

ClCompile:
  PreprocessorDefinitions:
  - TRINITY_PLATFORM=TRINITY_DIRECTX11
Link:
  AdditionalLibraryDirectories:
  - ../../autobuild/TrinityAL/$(Platform)/$(PlatformToolset)/
  AdditionalDependencies:
  - d3d11.lib
  - dxgi.lib

Configurations:
  Debug|Win32,x64:
    ClCompile:
      PreprocessorDefinitions:
      - TRINITY_AL_GUARD_LOCKS=1
    Link:
      AdditionalDependencies:
      - TrinityAL_dx11_d.lib
  
  Dev|Win32,x64:
    ClCompile:
      PreprocessorDefinitions:
      - TRINITY_AL_GUARD_LOCKS=1
      - AL_TACK_RESOURCE_USAGE=1
    Link:
      AdditionalDependencies:
      - TrinityAL_dx11_dev.lib
  
  Release|Win32,x64:
    Link:
      AdditionalDependencies:
      - TrinityAL_dx11.lib
